name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Package
        run: |
          mkdir -p dist
          DIR="trilium-diary-${GITHUB_REF#refs/tags/v}"
          mkdir "$DIR"
          cp SKILL.md README.md "$DIR/"
          cp -r scripts references etc "$DIR/"
          rm -f "$DIR/etc/config.json"
          tar czf "dist/${DIR}.tar.gz" "$DIR"
          echo "ARCHIVE=dist/${DIR}.tar.gz" >> "$GITHUB_ENV"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARCHIVE }}
          generate_release_notes: true
